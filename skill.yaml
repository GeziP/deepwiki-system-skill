name: deepwiki-system
version: 0.2.0
template: deepwiki
owner: team-ai
language: zh-CN
description: 系统级架构设计文档生成 Skill。扫描代码仓库，分析模块结构与依赖关系，生成 Mermaid 系统架构图、模块摘要集合和完整系统设计文档。当用户询问系统架构、整体设计、模块关系、数据流、线程模型或要求生成架构图时，务必使用此 Skill。
tags:
  - architecture
  - documentation
  - mermaid
  - rag
  - code-analysis
  - system-design
  - deepwiki
  - zh-CN
defaults:
  answer_style: concise-technical
  citation_mode: filepath-inline
capabilities:
  - repo-analysis
  - architecture-diagram
  - module-summary
  - system-documentation
artifacts:
  repo_map: artifacts/repo-map.json
  chunks: artifacts/chunks.jsonl
  summaries: artifacts/module-summaries.json
  diagrams: artifacts/architecture.mmd
output:
  document: doc/Scheduler_Architecture_Design.md
routing:
  when_system_doc: references/code-analysis.md
  when_need_diagram: references/architecture-mermaid.md
  when_need_summary: references/module-summary.md
triggers:
  - "系统设计文档"
  - "架构设计文档"
  - "整体设计文档"
  - "deepwiki-system"