<!doctype html>
<html lang="zh-CN">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Work+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500;600&family=Noto+Serif+SC:wght@400;500;600&display=swap" rel="stylesheet">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="generator" content="deepwiki-html system">
  <title>{{DOC_TITLE}}</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" media="(prefers-color-scheme: light), (prefers-color-scheme: no-preference)">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" media="(prefers-color-scheme: dark)">
  <style>
    /* ===== CSS Variables (shared with deepwiki-module-skill) ===== */
    :root {
      --font-sans: "Work Sans", "Noto Sans SC", system-ui, sans-serif;
      --font-display: "Cormorant Garamond", "Noto Serif SC", serif;
      --font-mono: "IBM Plex Mono", Consolas, "Courier New", monospace;
      --line-height: 1.65;
      --max-width: 960px;
      --toc-width: 240px;
      --header-height: 48px;

      --bg: #F2EEDF;
      --bg-secondary: #ECE6D2;
      --bg-tertiary: #E4DDD0;
      --text: #2A241B;
      --text-secondary: #5C5345;
      --text-muted: #7A7060;
      --text-faint: #9A9080;
      --border: #D8D0C0;
      --border-light: #E4DDD0;
      --accent: #B07070;
      --accent-hover: #9A5A5A;
      --accent-soft: #F5EDED;
      --accent-light: #F5EDED;
      --accent-green: #16a34a; --accent-green-light: #edf7f0;
      --accent-orange: #ca8a04; --accent-orange-light: #fefce8;
      --accent-red: #dc2626; --accent-red-light: #fef2f2;
      --accent-purple: #7c3aed; --accent-purple-light: #f5f3ff;
      --code-bg: #ECE6D2;
      --code-border: #D8D0C0;
      --link: #8B5E5E;
      --link-hover: #6B4040;
      --shadow-sm: 0 1px 3px rgba(0,0,0,.06);
      --shadow-md: 0 4px 12px rgba(0,0,0,.08);
      --radius: 8px; --radius-lg: 8px;

      --info: #7B8FA0;      --info-bg: #EDF0F2;     --info-border: #C8D0D8;
      --success: #7B9A6B;   --success-bg: #EDF2EE;  --success-border: #C8D8CC;
      --warning: #B08B40;   --warning-bg: #F5F0E0;  --warning-border: #D8CCA0;
      --danger: #B05050;    --danger-bg: #F5EDED;   --danger-border: #D8B0B0;
      --note: #8B7B9A;      --note-bg: #F0EDF5;     --note-border: #C8C0D8;

      --card-green: #B7C7A8;
      --card-amber: #D6DD63;
      --card-red: #E1A4C2;
      --card-violet: #C9BEDC;
      --card-cyan: #A8C0B8;
      --card-blue: #9AB0C8;
    }

    [data-theme="dark"] {
      --bg: #1E1B16;
      --bg-secondary: #282420;
      --bg-tertiary: #302B25;
      --text: #E8DDD0;
      --text-secondary: #B0A595;
      --text-muted: #8A7E70;
      --text-faint: #6A6055;
      --border: #4A4440;
      --border-light: #352F2A;
      --accent: #D4A0A0;
      --accent-hover: #E0B5B5;
      --accent-soft: #2A1E1E;
      --accent-light: #2A1E1E;
      --accent-green: #3fb950; --accent-green-light: #0d2818;
      --accent-orange: #d29922; --accent-orange-light: #2a1f05;
      --accent-red: #f85149; --accent-red-light: #2d0d0d;
      --accent-purple: #a371f7; --accent-purple-light: #1a0d2e;
      --code-bg: #282420;
      --code-border: #4A4440;
      --link: #D4A0A0;
      --link-hover: #E0B5B5;
      --shadow-sm: 0 1px 3px rgba(0,0,0,.3);
      --shadow-md: 0 4px 12px rgba(0,0,0,.4);

      --info: #58a6ff;      --info-bg: #0d1d31;     --info-border: #1f4170;
      --success: #3fb950;   --success-bg: #0d2818;  --success-border: #1a4731;
      --warning: #d29922;   --warning-bg: #2a1f05;  --warning-border: #4b3a12;
      --danger: #f85149;    --danger-bg: #2d0d0d;   --danger-border: #5a1a1a;
      --note: #a371f7;      --note-bg: #1a0d2e;     --note-border: #3b2066;

      --card-green: #3fb950;
      --card-amber: #d29922;
      --card-red: #f85149;
      --card-violet: #a371f7;
      --card-cyan: #39d2c0;
      --card-blue: #58a6ff;
    }

    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) {
        --bg: #1E1B16; --bg-secondary: #282420; --bg-tertiary: #302B25;
        --text: #E8DDD0; --text-secondary: #B0A595; --text-muted: #8A7E70; --text-faint: #6A6055;
        --border: #4A4440; --border-light: #352F2A;
        --accent: #D4A0A0; --accent-hover: #E0B5B5; --accent-soft: #2A1E1E; --accent-light: #2A1E1E;
        --accent-green: #3fb950; --accent-green-light: #0d2818;
        --accent-orange: #d29922; --accent-orange-light: #2a1f05;
        --accent-red: #f85149; --accent-red-light: #2d0d0d;
        --accent-purple: #a371f7; --accent-purple-light: #1a0d2e;
        --code-bg: #282420; --code-border: #4A4440;
        --link: #D4A0A0; --link-hover: #E0B5B5;
        --shadow-sm: 0 1px 3px rgba(0,0,0,.3);
        --shadow-md: 0 4px 12px rgba(0,0,0,.4);
        --info: #58a6ff; --info-bg: #0d1d31; --info-border: #1f4170;
        --success: #3fb950; --success-bg: #0d2818; --success-border: #1a4731;
        --warning: #d29922; --warning-bg: #2a1f05; --warning-border: #4b3a12;
        --danger: #f85149; --danger-bg: #2d0d0d; --danger-border: #5a1a1a;
        --note: #a371f7; --note-bg: #1a0d2e; --note-border: #3b2066;
        --card-green: #3fb950; --card-amber: #d29922; --card-red: #f85149;
        --card-violet: #1a0d2e; --card-cyan: #0d2527; --card-blue: #0d1d31;
      }
    }

    /* ===== Reset ===== */
    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
    body {
      margin: 0;
      font-family: var(--font-sans);
      font-size: 15px;
      line-height: var(--line-height);
      color: var(--text);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
    }

    /* ===== Top bar ===== */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; gap: 12px;
      height: var(--header-height);
      padding: 0 24px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .topbar-brand { font-weight: 800; color: var(--accent); letter-spacing: .02em; white-space: nowrap; }
    .topbar-sep { color: var(--text-faint); }
    .topbar-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text-muted); }
    .topbar-actions { display: flex; align-items: center; gap: 6px; }
    .topbar-btn {
      display: inline-flex; align-items: center; justify-content: center;
      width: 32px; height: 32px;
      border: 1px solid var(--border); border-radius: 6px;
      background: var(--bg); color: var(--text-muted);
      cursor: pointer; font-size: 16px;
      transition: border-color .15s, color .15s;
    }
    .topbar-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ===== Layout ===== */
    .layout { display: grid; grid-template-columns: var(--toc-width) 1fr; min-height: calc(100vh - var(--header-height)); }

    /* ===== Sidebar TOC ===== */
    .sidebar {
      position: sticky; top: var(--header-height);
      height: calc(100vh - var(--header-height));
      overflow-y: auto; padding: 20px 0 20px 20px;
      border-right: 1px solid var(--border);
      font-size: 13px; scrollbar-width: thin;
    }
    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .toc-list { list-style: none; margin: 0; padding: 0; }
    .toc-list li { margin: 0; }
    .toc-list a {
      display: block; padding: 4px 12px 4px 10px;
      color: var(--text-muted); text-decoration: none;
      border-left: 2px solid transparent;
      border-radius: 0 4px 4px 0;
      transition: color .15s, border-color .15s, background .15s;
      line-height: 1.4;
    }
    .toc-list a:hover { color: var(--text); background: var(--bg-secondary); }
    .toc-list a.active { color: var(--accent); border-left-color: var(--accent); font-weight: 600; }
    .toc-list .toc-h3 { padding-left: 24px; font-size: 12px; }

    /* ===== Main content ===== */
    .main { max-width: var(--max-width); margin: 0 auto; padding: 32px 40px 80px; }

    /* ===== Document metadata header ===== */
    .doc-meta { margin-bottom: 36px; }
    .doc-version {
      display: inline-block; padding: 2px 10px; border-radius: 4px;
      background: var(--accent-soft); color: var(--accent);
      font-size: 12px; font-weight: 700; letter-spacing: .03em;
    }
    .doc-meta h1 { margin: 12px 0 16px; font-size: 32px; line-height: 1.2; letter-spacing: -.01em; }
    .meta-grid {
      display: grid; grid-template-columns: auto 1fr; gap: 4px 16px;
      margin: 0; padding: 14px 18px;
      border: 1px solid var(--border); border-radius: 8px;
      background: var(--bg-secondary); font-size: 14px;
    }
    .meta-grid dt { color: var(--text-muted); font-weight: 600; white-space: nowrap; }
    .meta-grid dd { margin: 0; }

    /* ===== Headings ===== */
    h1, h2, h3, h4 { margin: 0; color: var(--text); line-height: 1.3; font-family: var(--font-display); }
    h2 { margin: 40px 0 16px; padding-bottom: 8px; font-size: 22px; border-bottom: 2px solid var(--border-light); }
    h3 { margin: 28px 0 10px; font-size: 17px; }
    h4 { margin: 20px 0 8px; font-size: 15px; font-weight: 700; }
    summary > h2, summary > h3 { display: inline; margin: 0; border: 0; padding: 0; }

    /* ===== Paragraphs & links ===== */
    p { margin: 0 0 12px; }
    a { color: var(--link); text-decoration: none; }
    a:hover { color: var(--link-hover); text-decoration: underline; }

    /* ===== Details / collapsible sections ===== */
    details { margin: 24px 0; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    details > summary {
      padding: 12px 18px; background: var(--bg-secondary);
      cursor: pointer; font-weight: 700; font-size: 18px;
      list-style: none; user-select: none;
    }
    details > summary::-webkit-details-marker { display: none; }
    details > summary::before {
      content: "▸"; display: inline-block; width: 20px;
      color: var(--text-faint); transition: transform .15s;
    }
    details[open] > summary::before { transform: rotate(90deg); }
    details > summary:hover { background: var(--bg-tertiary); }
    details > .section-body { padding: 18px 20px; }

    /* ===== Mermaid diagram container ===== */
    .mermaid-wrap {
      margin: 20px 0; padding: 20px;
      border: 1px solid var(--border); border-radius: 8px;
      background: var(--bg-secondary); text-align: center;
      overflow-x: auto;
      cursor: zoom-in; position: relative;
    }
    .mermaid-wrap:hover {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(28,135,144,0.12);
    }
    .mermaid-wrap::after {
      content: '点击放大'; position: absolute;
      bottom: 6px; right: 10px; font-size: 12px;
      color: var(--text-faint); opacity: 0;
      transition: opacity 0.2s; pointer-events: none;
    }
    .mermaid-wrap:hover::after { opacity: 1; }
    .mermaid-wrap .mermaid { display: inline-block; max-width: 100%; }
    .mermaid-wrap figcaption {
      margin-top: 12px; font-size: 13px;
      color: var(--text-faint); font-style: italic;
    }
    /* Mermaid loading placeholder */
    .mermaid-loading {
      padding: 40px; color: var(--text-faint); font-size: 14px;
    }

    /* ===== Mermaid Zoom Overlay ===== */
    .mermaid-overlay {
      display: none; position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.85); z-index: 9999;
      cursor: grab; overflow: hidden;
    }
    .mermaid-overlay.active { display: flex; align-items: center; justify-content: center; }
    .mermaid-overlay.grabbing { cursor: grabbing; }
    .mermaid-overlay-inner { transform-origin: center center; }
    .mermaid-overlay .zoom-controls {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 8px; background: rgba(30,30,50,0.9);
      padding: 8px 16px; border-radius: 40px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4); z-index: 10000; user-select: none;
    }
    .mermaid-overlay .zoom-controls button {
      background: rgba(255,255,255,0.1); border: none; color: #fff;
      width: 36px; height: 36px; border-radius: 50%; font-size: 18px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .mermaid-overlay .zoom-controls button:hover { background: rgba(255,255,255,0.25); }
    .mermaid-overlay .zoom-controls .zoom-level {
      color: #aaa; font-size: 13px; min-width: 50px; text-align: center; line-height: 36px;
    }
    .mermaid-overlay .zoom-close {
      position: fixed; top: 16px; right: 20px;
      background: rgba(255,255,255,0.1); border: none; color: #fff;
      width: 40px; height: 40px; border-radius: 50%; font-size: 22px;
      cursor: pointer; z-index: 10000;
      display: flex; align-items: center; justify-content: center;
    }
    .mermaid-overlay .zoom-close:hover { background: rgba(255,255,255,0.25); }
    .mermaid-overlay .zoom-hint {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.5); font-size: 13px; z-index: 10000; pointer-events: none;
    }

    /* ===== Callouts ===== */
    .callout {
      margin: 16px 0; padding: 14px 18px;
      border-radius: 8px; border-left: 4px solid;
      font-size: 14px; line-height: 1.6;
    }
    .callout strong { display: block; margin-bottom: 4px; font-size: 13px; text-transform: uppercase; letter-spacing: .04em; }
    .callout.info    { background: var(--info-bg);    border-color: var(--info);    color: var(--text); }
    .callout.success { background: var(--success-bg); border-color: var(--success); color: var(--text); }
    .callout.warning { background: var(--warning-bg); border-color: var(--warning); color: var(--text); }
    .callout.danger  { background: var(--danger-bg);  border-color: var(--danger);  color: var(--text); }
    .callout.note    { background: var(--note-bg);    border-color: var(--note);    color: var(--text); }

    /* ===== Card grid ===== */
    .card-grid { display: grid; gap: 16px; margin: 16px 0; }
    .card-grid.cols-2 { grid-template-columns: repeat(2, 1fr); }
    .card-grid.cols-3 { grid-template-columns: repeat(3, 1fr); }
    .card { padding: 18px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); }
    .card h3 { margin: 0 0 10px; font-size: 15px; }
    .card ul { margin: 0; padding-left: 18px; font-size: 14px; color: var(--text-muted); }
    .card li + li { margin-top: 4px; }
    .card.accent-green  { background: var(--card-green);  border-color: color-mix(in srgb, var(--success) 30%, var(--border)); }
    .card.accent-amber  { background: var(--card-amber);  border-color: color-mix(in srgb, var(--warning) 30%, var(--border)); }
    .card.accent-red    { background: var(--card-red);    border-color: color-mix(in srgb, var(--danger)  30%, var(--border)); }
    .card.accent-violet { background: var(--card-violet); border-color: color-mix(in srgb, var(--note)    30%, var(--border)); }
    .card.accent-cyan   { background: var(--card-cyan);   border-color: color-mix(in srgb, var(--accent)  30%, var(--border)); }
    .card.accent-blue   { background: var(--card-blue);   border-color: color-mix(in srgb, var(--info)    30%, var(--border)); }

    /* ===== Code blocks ===== */
    code {
      padding: 2px 6px; border-radius: 4px;
      background: var(--code-bg);
      font-family: var(--font-mono); font-size: .9em;
    }
    .code-block { position: relative; margin: 16px 0; }
    .code-block .copy-btn {
      position: absolute; top: 8px; right: 8px;
      font-size: 12px; color: var(--text-muted);
      background: var(--bg-secondary); border: 1px solid var(--border);
      border-radius: 4px; padding: 2px 8px; cursor: pointer;
      opacity: 0; transition: opacity 0.15s;
    }
    .code-block:hover .copy-btn { opacity: 1; }
    .copy-btn.copied { color: var(--success); border-color: var(--success); }
    .code-block pre {
      margin: 0; padding: 16px 20px;
      border: 1px solid var(--code-border); border-radius: 8px;
      background: var(--code-bg); overflow-x: auto;
      font-family: var(--font-mono); font-size: 13.5px;
      line-height: 1.55; tab-size: 4;
    }
    .code-block pre code, .code-block pre code.hljs { padding: 0; background: none; font-size: inherit; }
    [data-theme="dark"] .hljs { color: #e6edf3; background: var(--code-bg); }
    [data-theme="dark"] .hljs-keyword { color: #ff7b72; }
    [data-theme="dark"] .hljs-string, [data-theme="dark"] .hljs-attr { color: #a5d6ff; }
    [data-theme="dark"] .hljs-comment { color: #8b949e; }
    [data-theme="dark"] .hljs-type, [data-theme="dark"] .hljs-built_in { color: #79c0ff; }
    [data-theme="dark"] .hljs-number { color: #79c0ff; }
    [data-theme="dark"] .hljs-function { color: #d2a8ff; }
    [data-theme="dark"] .hljs-class .hljs-title { color: #ffa657; }
    [data-theme="dark"] .hljs-meta { color: #79c0ff; }

    /* ===== Tables ===== */
    .table-wrapper { margin: 16px 0; overflow-x: auto; border: 1px solid var(--border); border-radius: 8px; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td { padding: 10px 14px; text-align: left; border-bottom: 1px solid var(--border-light); }
    th { background: var(--bg-secondary); font-weight: 700; color: var(--text); white-space: nowrap; }
    td { color: var(--text-muted); vertical-align: top; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--bg-secondary); }
    td code { font-size: .85em; }

    /* ===== Diagrams (SVG) ===== */
    .diagram { margin: 20px 0; text-align: center; }
    .diagram svg { max-width: 100%; height: auto; }
    .diagram figcaption { margin-top: 8px; font-size: 13px; color: var(--text-faint); font-style: italic; }

    /* ===== Flow (horizontal steps) ===== */
    .flow { display: flex; gap: 8px; margin: 16px 0; flex-wrap: wrap; }
    .flow-step {
      flex: 1; min-width: 120px; position: relative;
      padding: 12px 14px;
      border: 1px solid var(--border); border-radius: 8px;
      background: var(--bg); text-align: center;
    }
    .flow-step b { display: block; font-size: 14px; color: var(--text); }
    .flow-step span { font-size: 12px; color: var(--text-muted); }
    .flow-step:not(:last-child)::after {
      content: "→"; position: absolute; right: -14px; top: 50%;
      transform: translateY(-50%); color: var(--text-faint); font-size: 18px; z-index: 1;
    }

    /* ===== Changelog ===== */
    .changelog { margin: 16px 0; padding: 0; list-style: none; }
    .changelog li {
      position: relative; padding: 8px 0 8px 24px;
      border-left: 2px solid var(--border);
      font-size: 14px; color: var(--text-muted);
    }
    .changelog li::before {
      content: ""; position: absolute; left: -5px; top: 14px;
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent); border: 2px solid var(--bg);
    }
    .changelog li:first-child::before { background: var(--success); }
    .changelog time { font-weight: 600; color: var(--text); margin-right: 8px; }
    .changelog .tag {
      display: inline-block; padding: 1px 8px; margin-right: 6px;
      border-radius: 4px; background: var(--accent-soft);
      color: var(--accent); font-size: 12px; font-weight: 700;
    }

    /* ===== Dependency tree ===== */
    .dep-tree {
      margin: 12px 0; padding: 14px 18px;
      border: 1px solid var(--border); border-radius: 8px;
      background: var(--code-bg);
      font-family: var(--font-mono); font-size: 13px;
      line-height: 1.6; white-space: pre;
    }

    /* ===== Module detail panels ===== */
    .module-panel { margin: 16px 0; }
    .module-panel > summary {
      padding: 10px 16px; background: var(--bg-secondary);
      cursor: pointer; font-weight: 700; font-size: 16px;
      list-style: none; user-select: none;
      border: 1px solid var(--border); border-radius: 8px;
    }
    .module-panel > summary::-webkit-details-marker { display: none; }
    .module-panel > summary::before {
      content: "▸"; display: inline-block; width: 16px;
      color: var(--text-faint); transition: transform .15s;
    }
    .module-panel[open] > summary::before { transform: rotate(90deg); }
    .module-panel > summary:hover { background: var(--bg-tertiary); }
    .module-panel > .module-body {
      padding: 16px 20px;
      border: 1px solid var(--border); border-top: none;
      border-radius: 0 0 8px 8px;
    }

    /* ===== Lists ===== */
    ul, ol { margin: 0 0 12px; padding-left: 22px; }
    li + li { margin-top: 3px; }

    /* ===== Responsive ===== */
    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .sidebar.open {
        display: block; position: fixed;
        top: var(--header-height); left: 0;
        width: 280px; height: calc(100vh - var(--header-height));
        background: var(--bg); z-index: 99;
        box-shadow: var(--shadow-md);
      }
      .main { padding: 24px 20px 60px; }
      .card-grid.cols-3 { grid-template-columns: 1fr; }
      .card-grid.cols-2 { grid-template-columns: 1fr; }
    }

    /* ===== Scope Block ===== */
    .scope-block {
      background: var(--info-bg); border-left: 3px solid var(--info);
      padding: 12px 16px; border-radius: var(--radius); margin-bottom: 20px;
      font-size: 0.9rem;
    }

    /* ===== Print ===== */
    @media print {
      .topbar, .sidebar, .topbar-actions { display: none !important; }
      .layout { display: block; }
      .main { max-width: 100%; padding: 0; }
      details, .module-panel { border: none; }
      details > summary, .module-panel > summary { display: none; }
      details > .section-body, .module-panel > .module-body { padding: 0; display: block !important; }
      .code-block .copy-btn { display: none; }
      .callout { break-inside: avoid; }
      .card-grid { break-inside: avoid; }
      .mermaid-wrap { break-inside: avoid; }
      a[href]::after { content: " (" attr(href) ")"; font-size: .85em; color: #666; }
      a[href^="#"]::after { content: none; }
    }

    .menu-toggle { display: none; }
    @media (max-width: 900px) { .menu-toggle { display: inline-flex; } }
  </style>
</head>
<body data-doctype="system-design">

  <nav class="topbar">
    <span class="topbar-brand">HDSA-MACO</span>
    <span class="topbar-sep">/</span>
    <span class="topbar-title">{{DOC_TITLE}}</span>
    <div class="topbar-actions">
      <button class="topbar-btn menu-toggle" onclick="toggleSidebar()" title="目录">&#9776;</button>
      <button class="topbar-btn" onclick="toggleTheme()" title="切换主题">&#9680;</button>
      <button class="topbar-btn" onclick="window.print()" title="打印">&#9113;</button>
    </div>
  </nav>

  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <nav><ul class="toc-list" id="toc"></ul></nav>
    </aside>

    <article class="main" id="content">
      <header class="doc-meta">
        <span class="doc-version">{{VERSION}}</span>
        <h1>{{DOC_TITLE}}</h1>
        <dl class="meta-grid">
          {{META_ROWS}}
        </dl>
      </header>

      {{SECTIONS}}

    </article>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mermaid/10.9.0/mermaid.min.js"></script>
  <script>
  (function() {
    'use strict';

    // --- Theme ---
    var root = document.documentElement;
    var saved = localStorage.getItem('doc-theme');
    if (saved) root.setAttribute('data-theme', saved);

    function isDark() {
      var t = root.getAttribute('data-theme');
      if (t === 'dark') return true;
      if (t === 'light') return false;
      return window.matchMedia('(prefers-color-scheme: dark)').matches;
    }

    window.toggleTheme = function() {
      var next = isDark() ? 'light' : 'dark';
      root.setAttribute('data-theme', next);
      localStorage.setItem('doc-theme', next);
      rerenderMermaid();
    };

    // --- Mermaid ---
    function initMermaid() {
      if (typeof mermaid === 'undefined') return;
      mermaid.initialize({
        startOnLoad: true,
        theme: isDark() ? 'dark' : 'default',
        flowchart: { useMaxWidth: true, htmlLabels: true },
        securityLevel: 'loose'
      });
    }

    function rerenderMermaid() {
      if (typeof mermaid === 'undefined') return;
      // Reset mermaid and re-render
      mermaid.initialize({
        startOnLoad: false,
        theme: isDark() ? 'dark' : 'default',
        flowchart: { useMaxWidth: true, htmlLabels: true },
        securityLevel: 'loose'
      });
      document.querySelectorAll('.mermaid[data-processed]').forEach(function(el) {
        el.removeAttribute('data-processed');
        el.innerHTML = el.getAttribute('data-original') || el.textContent;
      });
      mermaid.run();
    }

    // Store original mermaid content for re-rendering
    document.querySelectorAll('.mermaid').forEach(function(el) {
      el.setAttribute('data-original', el.textContent);
    });
    initMermaid();

    // --- Syntax highlighting ---
    if (typeof hljs !== 'undefined') {
      document.querySelectorAll('.code-block pre code').forEach(function(block) {
        var lang = block.closest('.code-block')?.getAttribute('data-lang');
        if (lang && hljs.getLanguage(lang)) {
          block.className = 'hljs language-' + lang;
          hljs.highlightElement(block);
        }
      });
    }

    // --- Code copy buttons ---
    document.querySelectorAll('.code-block').forEach(function(block) {
      if (block.querySelector('.copy-btn')) return;
      var btn = document.createElement('button');
      btn.className = 'copy-btn';
      btn.textContent = 'Copy';
      btn.addEventListener('click', function() {
        var code = block.querySelector('code');
        if (code && navigator.clipboard) {
          navigator.clipboard.writeText(code.textContent).then(function() {
            btn.textContent = '✓';
            btn.classList.add('copied');
            setTimeout(function() { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1500);
          });
        }
      });
      block.appendChild(btn);
    });

    // --- TOC (static entries from converter) ---
    var toc = document.getElementById('toc');

    // --- Active TOC tracking ---
    var tocLinks = toc.querySelectorAll('a');
    var observer = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          var id = entry.target.id;
          tocLinks.forEach(function(a) {
            a.classList.toggle('active', a.getAttribute('href') === '#' + id);
          });
        }
      });
    }, { rootMargin: '-80px 0px -60% 0px' });

    document.querySelectorAll('h2[id], h3[id]').forEach(function(h) { observer.observe(h); });
    } // end if (toc)

    // --- Sidebar toggle (mobile) ---
    window.toggleSidebar = function() {
      document.getElementById('sidebar').classList.toggle('open');
    };

    // --- Mermaid Zoom (click to fullscreen) ---
    (function() {
      var overlay = document.createElement('div');
      overlay.className = 'mermaid-overlay';
      overlay.innerHTML =
        '<button class="zoom-close" title="关闭 (Esc)">&times;</button>' +
        '<span class="zoom-hint">滚轮缩放 · 拖拽平移 · 点击空白处关闭</span>' +
        '<div class="mermaid-overlay-inner"></div>' +
        '<div class="zoom-controls">' +
        '<button class="zoom-out" title="缩小">−</button>' +
        '<span class="zoom-level">100%</span>' +
        '<button class="zoom-in" title="放大">+</button>' +
        '<button class="zoom-reset" title="重置">⟲</button>' +
        '</div>';
      document.body.appendChild(overlay);

      var inner = overlay.querySelector('.mermaid-overlay-inner');
      var zoomLevelEl = overlay.querySelector('.zoom-level');
      var scale = 1, panX = 0, panY = 0, isDragging = false, dragX, dragY;
      var MIN = 0.2, MAX = 5;

      function update() {
        inner.style.transform = 'translate(' + panX + 'px,' + panY + 'px) scale(' + scale + ')';
        zoomLevelEl.textContent = Math.round(scale * 100) + '%';
      }
      function reset() { scale = 1; panX = 0; panY = 0; update(); }
      function close() {
        overlay.classList.remove('active');
        document.body.style.overflow = '';
        inner.innerHTML = '';
      }

      function openZoom(wrap) {
        var svg = wrap.querySelector('svg');
        if (!svg) return;
        inner.innerHTML = '';
        var clone = svg.cloneNode(true);
        clone.style.maxWidth = 'none';
        var vb = clone.getAttribute('viewBox');
        if (vb) { var p = vb.split(/[\s,]+/); clone.style.width = (parseInt(p[2]) || 700) + 'px'; }
        inner.appendChild(clone);
        reset();
        overlay.classList.add('active');
        document.body.style.overflow = 'hidden';
        setTimeout(function() {
          var r = clone.getBoundingClientRect();
          var vw = window.innerWidth * 0.9, vh = window.innerHeight * 0.8;
          if (r.width > vw || r.height > vh) {
            scale = Math.min(vw / r.width, vh / r.height);
            update();
          }
        }, 50);
      }

      // Bind click directly to each .mermaid-wrap (after mermaid renders)
      function bindZoomHandlers() {
        document.querySelectorAll('.mermaid-wrap').forEach(function(wrap) {
          if (wrap.getAttribute('data-zoom-bound')) return;
          wrap.setAttribute('data-zoom-bound', '1');
          wrap.style.cursor = 'zoom-in';
          wrap.addEventListener('click', function(e) {
            if (overlay.classList.contains('active')) return;
            openZoom(wrap);
          });
        });
      }
      bindZoomHandlers();
      setTimeout(bindZoomHandlers, 500);
      setTimeout(bindZoomHandlers, 2000);
      var zoomObs = new MutationObserver(function() { bindZoomHandlers(); });
      zoomObs.observe(document.body, { childList: true, subtree: true });
      // Fallback event delegation
      document.addEventListener('click', function(e) {
        if (overlay.classList.contains('active')) return;
        var wrap = e.target.closest('.mermaid-wrap');
        if (wrap && wrap.querySelector('svg')) openZoom(wrap);
      });

      // Close handlers
      overlay.querySelector('.zoom-close').addEventListener('click', close);
      overlay.addEventListener('click', function(e) {
        if (e.target === overlay || e.target === inner) close();
      });
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && overlay.classList.contains('active')) close();
      });

      // Zoom buttons
      overlay.querySelector('.zoom-in').addEventListener('click', function(e) {
        e.stopPropagation(); scale = Math.min(MAX, scale * 1.25); update();
      });
      overlay.querySelector('.zoom-out').addEventListener('click', function(e) {
        e.stopPropagation(); scale = Math.max(MIN, scale / 1.25); update();
      });
      overlay.querySelector('.zoom-reset').addEventListener('click', function(e) {
        e.stopPropagation(); reset();
      });

      // Mouse wheel
      overlay.addEventListener('wheel', function(e) {
        e.preventDefault();
        scale = Math.max(MIN, Math.min(MAX, scale * (e.deltaY > 0 ? 0.9 : 1.1)));
        update();
      }, { passive: false });

      // Drag
      inner.addEventListener('mousedown', function(e) {
        isDragging = true; dragX = e.clientX - panX; dragY = e.clientY - panY;
        overlay.classList.add('grabbing'); e.preventDefault();
      });
      document.addEventListener('mousemove', function(e) {
        if (!isDragging) return;
        panX = e.clientX - dragX; panY = e.clientY - dragY; update();
      });
      document.addEventListener('mouseup', function() {
        isDragging = false; overlay.classList.remove('grabbing');
      });

      // Touch
      var lastDist = 0;
      inner.addEventListener('touchstart', function(e) {
        if (e.touches.length === 1) {
          isDragging = true; dragX = e.touches[0].clientX - panX; dragY = e.touches[0].clientY - panY;
        } else if (e.touches.length === 2) {
          isDragging = false;
          lastDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        }
        e.preventDefault();
      }, { passive: false });
      inner.addEventListener('touchmove', function(e) {
        if (e.touches.length === 1 && isDragging) {
          panX = e.touches[0].clientX - dragX; panY = e.touches[0].clientY - dragY; update();
        } else if (e.touches.length === 2 && lastDist > 0) {
          var d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
          scale = Math.max(MIN, Math.min(MAX, scale * (d / lastDist)));
          lastDist = d; update();
        }
        e.preventDefault();
      }, { passive: false });
      inner.addEventListener('touchend', function() { isDragging = false; lastDist = 0; });
    })();
  })();
